name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run plugin test suite
        run: ./gradlew :plugin:test

      - name: Build gradle-plugin
        run: ./gradlew :gradle-plugin:build

      - name: Verify sample-app demo fails with expected SAST diagnostics
        run: |
          set +e
          output=$(./gradlew :sample-app:compileKotlin 2>&1)
          exit_code=$?
          set -e
          echo "$output"

          if [ "$exit_code" -eq 0 ]; then
            echo "::error::sample-app was expected to fail with SAST001/SAST002 but the build succeeded"
            exit 1
          fi

          if ! echo "$output" | grep -q "SAST001" || ! echo "$output" | grep -q "SAST002"; then
            echo "::error::sample-app failed, but not with the expected SAST001/SAST002 diagnostics - this may be an unrelated regression"
            exit 1
          fi

          echo "sample-app correctly failed with the expected SAST001/SAST002 diagnostics"
